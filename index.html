<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>内容页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.8;
            color: #333;
            background: #f8f9fa;
        }
        .title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 30px;
            text-align: center;
            color: #222;
        }
        .item {
            margin-bottom: 40px;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .item img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
        }
        .item .text {
            padding: 20px 24px;
            white-space: pre-wrap;
            font-size: 16px;
            color: #444;
        }
        .error {
            color: #dc3545;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <h1 class="title" id="title">加载中...</h1>
    <div id="container"></div>

    <script>
        // 配置：最多支持多少组图片+文本
        const maxItems = 10;
        const container = document.getElementById('container');
        const titleEl = document.getElementById('title');

        // 1. 先加载标题 0.txt
        fetch('0.txt')
            .then(res => res.text())
            .then(text => {
                titleEl.textContent = text.trim() || '无标题';
            })
            .catch(() => {
                titleEl.textContent = '标题加载失败';
            });

        // 2. 支持的图片格式
        const imgExts = ['jpg', 'jpeg', 'png', 'gif', 'webp'];

        // 3. 循环加载 image1 + 1.txt, image2 + 2.txt ...
        async function loadItems() {
            for (let i = 1; i <= maxItems; i++) {
                let imgSrc = null;

                // 尝试找到存在的图片
                for (const ext of imgExts) {
                    const testImg = new Image();
                    try {
                        await new Promise((resolve, reject) => {
                            testImg.onload = resolve;
                            testImg.onerror = reject;
                            testImg.src = `image${i}.${ext}`;
                        });
                        imgSrc = `image${i}.${ext}`;
                        break;
                    } catch (e) {}
                }

                // 尝试加载对应文本
                let textContent = '';
                try {
                    const res = await fetch(`${i}.txt`);
                    textContent = await res.text();
                } catch (e) {
                    textContent = '（文本加载失败）';
                }

                // 只要有图片或文本，就渲染这一项
                if (imgSrc || textContent.trim()) {
                    const item = document.createElement('div');
                    item.className = 'item';

                    if (imgSrc) {
                        const img = document.createElement('img');
                        img.src = imgSrc;
                        img.alt = `插图 ${i}`;
                        item.appendChild(img);
                    }

                    if (textContent.trim()) {
                        const text = document.createElement('div');
                        text.className = 'text';
                        text.textContent = textContent;
                        item.appendChild(text);
                    }

                    container.appendChild(item);
                } else {
                    // 没有图片也没有文本，认为到了最后一组
                    break;
                }
            }
        }

        loadItems();
    </script>
</body>
</html>
