<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>内容页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.7;
            font-size: 16px;
            color: #333;
            background: #fff;
        }
        .title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
            color: #222;
        }
        .image {
            width: 100%;
            border-radius: 8px;
            margin-bottom: 24px;
            object-fit: cover;
        }
        .content {
            white-space: pre-wrap;
            text-align: justify;
        }
    </style>
</head>
<body>

    <h1 class="title" id="title">加载中...</h1>
    <img class="image" id="img" alt="插图">
    <div class="content" id="text">正在读取内容...</div>

    <script>
        // 1. 读取标题 0.txt
        fetch('0.txt')
            .then(res => res.text())
            .then(text => {
                document.getElementById('title').textContent = text.trim();
            })
            .catch(() => {
                document.getElementById('title').textContent = '标题加载失败';
            });

        // 2. 读取正文 1.txt
        fetch('1.txt')
            .then(res => res.text())
            .then(text => {
                document.getElementById('text').textContent = text;
            })
            .catch(() => {
                document.getElementById('text').textContent = '正文加载失败';
            });

        // 3. 自动加载图片（支持常见格式）
        const img = document.getElementById('img');
        const exts = ['jpg', 'jpeg', 'png', 'gif', 'webp'];
        let tried = 0;

        function tryImage(ext) {
            const temp = new Image();
            temp.onload = () => { img.src = `image.${ext}`; };
            temp.onerror = () => {
                tried++;
                if (tried < exts.length) tryImage(exts[tried]);
                else img.style.display = 'none';
            };
            temp.src = `image.${ext}`;
        }

        tryImage(exts[0]);
    </script>
</body>
</html>
