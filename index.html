<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eternallight.dpdns.org</title>
    <style>
        /* 全局样式 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #c94b4b, #4b134f);
            background-attachment: fixed;
            color: white;
            text-align: center;
            padding-bottom: 50px;
        }

        /* 顶部标题 */
        header { padding: 60px 20px 20px; }
        header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #ffcc00;
        }
        header p { font-size: 1.2rem; opacity: 0.9; }

        /* 马年装饰 */
        .horse-decoration {
            font-size: 8rem;
            margin: 20px 0;
            animation: jump 2s infinite ease-in-out;
        }
        @keyframes jump {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* 祝福卡片 */
        .wish-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        .wish-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s;
        }
        .wish-card:hover { transform: scale(1.05); }
        .wish-card h3 {
            color: #ffcc00;
            margin-bottom: 15px;
            font-size: 1.5rem;
        }

        /* 底部信息 */
        footer {
            margin-top: 50px;
            padding: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <header>
        <h1>🐎 2026 马年大吉</h1>
        <p>eternallight.dpdns.org | 祝您马到成功</p>
    </header>

    <div class="horse-decoration">🐎</div>

    <div class="wish-container">
        <div class="wish-card">
            <h3>一马当先</h3>
            <p>新的一年，愿您事业一马当先，前程似锦，步步高升！</p>
        </div>
        <div class="wish-card">
            <h3>龙马精神</h3>
            <p>身体硬朗，活力满满，无病无灾，岁岁平安。</p>
        </div>
        <div class="wish-card">
            <h3>财源广进</h3>
            <p>马年行大运，财运亨通，口袋满满，福气连连。</p>
        </div>
    </div>

    <footer>
        <p>© 2026 eternallight.dpdns.org |  Powered by GitHub Pages</p>
    </footer>
</body>
</html>
