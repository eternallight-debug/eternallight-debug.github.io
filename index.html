<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 马年大吉 - 官方首页</title>
    <style>
        /* 全局样式重置与基础设置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: #f5f5f5;
            color: #333;
        }

        /* 导航栏样式 */
        nav {
            background-color: #2c3e50;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #f1c40f; /* 金色点缀 */
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 2rem;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #f1c40f;
        }

        /* 英雄区 (大图展示) */
        .hero {
            height: 90vh;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), url('https://img.icons8.com/fluency/200/000000/horse-head.png');
            background-size: contain;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            padding: 0 5%;
        }

        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            color: #f1c40f;
        }

        .hero p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            max-width: 800px;
        }

        .btn {
            padding: 12px 30px;
            background-color: #f1c40f;
            color: #2c3e50;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.3s;
        }

        .btn:hover {
            background-color: #d4ac0d;
        }

        /* 内容卡片区 */
        .container {
            max-width: 1200px;
            margin: 5rem auto;
            padding: 0 5%;
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 3rem;
            color: #2c3e50;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .card {
            background-color: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
        }

        .card-img {
            height: 200px;
            background-color: #3498db;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3rem;
        }

        .card-body {
            padding: 1.5rem;
        }

        .card-body h3 {
            margin-bottom: 1rem;
            color: #2c3e50;
        }

        /* 页脚样式 */
        footer {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 2rem 0;
            margin-top: 5rem;
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            .hero h1 { font-size: 2.5rem; }
            .nav-links { display: none; } /* 移动端简化导航 */
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav>
        <div class="logo">🐎 马年大吉</div>
        <div class="nav-links">
            <a href="#">首页</a>
            <a href="#">新闻</a>
            <a href="#">产品</a>
            <a href="#">关于我们</a>
        </div>
    </nav>

    <!-- 英雄区 -->
    <section class="hero">
        <h1>2026 丙午马年</h1>
        <p>新岁序开，共赴新程。愿您在新的一年里，策马扬鞭，前程似锦，万事马到成功！</p>
        <a href="#" class="btn">立即开启</a>
    </section>

    <!-- 内容卡片 -->
    <div class="container">
        <h2 class="section-title">新春祝福</h2>
        <div class="cards">
            <div class="card">
                <div class="card-img">🧧</div>
                <div class="card-body">
                    <h3>财源广进</h3>
                    <p>马年行大运，财运亨通，口袋满满，福气连连。</p>
                </div>
            </div>
            <div class="card">
                <div class="card-img">🍎</div>
                <div class="card-body">
                    <h3>平安健康</h3>
                    <p>身体硬朗，岁岁平安，无病无灾，龙马精神。</p>
                </div>
            </div>
            <div class="card">
                <div class="card-img">🚀</div>
                <div class="card-body">
                    <h3>事业腾飞</h3>
                    <p>一马当先，步步高升，事业有成，鹏程万里。</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer>
        <p>© 2026 马年大吉 版权所有 | 祝大家新春快乐</p>
    </footer>

    <!-- 简单的交互脚本 -->
    <script>
        // 示例：点击按钮后的简单反馈
        document.querySelector('.btn').addEventListener('click', function(e) {
            e.preventDefault();
            alert('恭喜发财！2026 马到功成！');
        });
    </script>
</body>
</html>
